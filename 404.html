<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada | Maurício</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0f1e3d, #1f3b7a);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .container {
      max-width: 560px;
      width: 100%;
      padding: 12px;
    }

    .error-image-wrap {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 420px;
      margin: 0 auto 20px;
    }

    .error-image {
      width: 100%;
      height: auto;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      display: block;
    }

    .error-image-hotspot {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 8.8%;
      width: 67%;
      height: 11.5%;
      border-radius: 999px;
      text-indent: -9999px;
      overflow: hidden;
    }

    h1 {
      font-size: 80px;
      margin: 0;
      color: #ffffff;
    }

    h2 {
      margin: 10px 0;
      font-weight: 300;
    }

    p {
      color: #d1d9f0;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      border-radius: 30px;
      background: linear-gradient(135deg, #2d5bff, #3b82f6);
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
    }

    .spiritual {
      font-size: 14px;
      margin-top: 20px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-image-wrap">
      <img src="/assets/erro/404.jpeg" alt="Ilustração da página de erro 404" class="error-image">
      <a href="/index.html" class="error-image-hotspot">Voltar para a página inicial</a>
    </div>

    <h1>404</h1>
    <h2>Essa página não foi encontrada</h2>

    <p>
      Assim como na vida espiritual, nem todos os caminhos são visíveis de imediato.
      Mas toda jornada encontra sua direção.
    </p>

    <a href="/index.html" class="btn">Voltar para a página inicial</a>

    <div class="spiritual">
      Maurício • Orientação Espiritual
    </div>
  </div>
</body>
</html>
