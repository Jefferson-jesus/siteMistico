<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Imagem placeholder para foto do cliente</title>
  <desc id="desc">Use este arquivo como local temporário para substituir pela foto real de Maurício.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#132b4f"/>
      <stop offset="55%" stop-color="#0f2343"/>
      <stop offset="100%" stop-color="#1d355d"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#f5e7c4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f5e7c4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="1200" fill="url(#bg)"/>
  <ellipse cx="440" cy="460" rx="260" ry="300" fill="url(#light)"/>
  <circle cx="455" cy="360" r="92" fill="#f0dca8" fill-opacity="0.5"/>
  <path d="M270 860c40-190 120-300 190-300s150 110 190 300" fill="#f0dca8" fill-opacity="0.42"/>
  <rect x="120" y="980" width="660" height="120" rx="24" fill="#ffffff" fill-opacity="0.08" stroke="#f0dca8" stroke-opacity="0.45"/>
  <text x="450" y="1030" text-anchor="middle" fill="#f5e7c4" font-size="32" font-family="Georgia, serif">Foto principal do cliente</text>
  <text x="450" y="1072" text-anchor="middle" fill="#d6dfef" font-size="24" font-family="Arial, sans-serif">Substitua este arquivo por uma foto real em alta qualidade</text>
</svg>
